<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Animation SVG</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    width: 100%;
    height: 100vh;
    background: #f1f1f1;
}
.icone {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%,-50%);
}
.icone path:nth-child(1) {
    stroke-dasharray: 3103px;
    stroke-dashoffset: 3103px;
    animation: anim 7s ease forwards;
}
@keyframes anim {
    to {
        stroke-dashoffset: 0;
    }
}
</style>
</head>
<body>
    <svg xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg"  xmlns:vectornator="http://vectornator.io" version="1.1" viewBox="0 0 841.995 595.35" class="icone">
